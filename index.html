<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Text Reader</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#333">
</head>
<body>
    <div id="app-container">
        <div id="video-container">
            <video id="video-feed" playsinline autoplay muted></video>
            <div id="overlay"></div>
        </div>
        <canvas id="capture-canvas" style="display: none;"></canvas>
        <div id="controls">
            <div id="status-container">
                <div id="spinner" class="hidden"></div>
                <p id="status-text">Initializing...</p>
            </div>
            <div class="control-group">
                <label for="zoom-slider">Zoom</label>
                <input type="range" id="zoom-slider" min="1" max="1" step="0.1" disabled>
            </div>
            <button id="switch-camera-button">
                <img src="switch-camera.png" alt="Switch Camera">
            </button>
        </div>
    </div>
    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>
    <script src="script.js"></script>

</body>
</html>
